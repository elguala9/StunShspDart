name: stun_shsp
description: >-
  Combines STUN (RFC 5389) and SHSP protocols into a unified handler for NAT
  traversal and peer-to-peer UDP communication. Supports dual IPv4/IPv6 stacks,
  runtime socket migration, optional compression, and dependency injection.
version: 0.1.2
repository: https://github.com/elguala9/StunShspDart

topics:
  - stun
  - nat
  - udp
  - networking
  - peer-to-peer

environment:
  sdk: ">=3.5.0 <4.0.0"

resolution: workspace

dependencies:
  stun: ^1.4.2
  shsp: ^1.6.1
  singleton_manager: ^0.6.1

dev_dependencies:
  lints: ^3.0.0
  test: ^1.24.0
  index_generator: ^4.1.2
  singleton_manager_generator: ^1.0.4
